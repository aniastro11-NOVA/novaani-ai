<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노바애니메이션 | NOVA Animation</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root {
    --navy: #1F304A;
    --lavender: #BDC9FF;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
                 "Noto Sans KR", Roboto, sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap {
    text-align: center;
    padding: 40px 24px;
  }
  .logo {
    width: 140px;
    height: auto;
    margin-bottom: 28px;
  }
  h1 {
    margin: 0 0 10px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--navy);
  }
  p.sub {
    margin: 0;
    font-size: 15px;
    color: #8a8fa3;
    font-weight: 400;
  }
  .bar {
    width: 48px;
    height: 4px;
    background: var(--lavender);
    border-radius: 2px;
    margin: 20px auto 20px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="nova-logo.png" alt="NOVA Animation logo">
    <h1>노바애니메이션</h1>
    <div class="bar"></div>
    <p class="sub">새로운 사이트를 준비 중입니다.<br>Coming soon.</p>
  </div>
</body>
</html>
